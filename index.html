<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Medical Minute — Student Medical Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* palette pulled from the logo */
    --mint: #dcebdb;
    --sage-light: #c3dac6;
    --sage: #a7c6b2;
    --sage-mid: #8fb49f;
    --sage-warm: #cdd6a9;
    --sage-deep: #6f8f78;
    --sage-edge: #55735e;
    --white: #fbfdfa;
    --cream: #f3f6ec;
    --ink: #38503f;
    --serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --sans: "Jost", "Segoe UI", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 0.75, 0.28, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--serif);
    color: var(--white);
    background: var(--sage);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  ::selection { background: rgba(255,255,255,0.25); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--white); outline-offset: 4px; border-radius: 4px; }

  /* ---------- Soft cloud-gradient background (echoes the badge) ---------- */
  .bg {
    position: fixed; inset: -20%; z-index: -3;
    background:
      radial-gradient(closest-side at 30% 28%, var(--mint), transparent 70%),
      radial-gradient(closest-side at 72% 40%, var(--sage-light), transparent 72%),
      radial-gradient(closest-side at 60% 82%, var(--sage-warm), transparent 70%),
      radial-gradient(closest-side at 20% 78%, var(--sage-mid), transparent 72%),
      linear-gradient(135deg, var(--sage-light), var(--sage-mid) 55%, var(--sage-deep));
    filter: saturate(1.02);
    animation: cloud 26s ease-in-out infinite alternate;
  }
  @keyframes cloud {
    0%   { transform: scale(1) translate(0, 0); }
    50%  { transform: scale(1.08) translate(1.5%, -1.5%); }
    100% { transform: scale(1.04) translate(-1.5%, 1%); }
  }
  .vignette {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background: radial-gradient(ellipse 78% 78% at 50% 46%, transparent 50%, rgba(55,80,63,0.30) 100%);
  }
  .grain {
    position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.06; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .glow { position: fixed; border-radius: 50%; filter: blur(70px); z-index: -2; pointer-events: none; opacity: 0.5; }
  .glow.g1 { width: 44vw; height: 44vw; background: radial-gradient(circle, rgba(255,255,255,0.5), transparent 70%); top: 4%; left: 12%; animation: float1 20s ease-in-out infinite; }
  .glow.g2 { width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(205,214,169,0.55), transparent 70%); bottom: 2%; right: 10%; animation: float2 24s ease-in-out infinite; }
  @keyframes float1 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(4%, 5%);} }
  @keyframes float2 { 0%,100% { transform: translate(0,0);} 50% { transform: translate(-5%, -3%);} }

  /* ---------- Layout ---------- */
  .stage { text-align: center; padding: 34px 6vw; position: relative; z-index: 1; max-width: 940px; }

  .eyebrow {
    font-family: var(--sans); font-weight: 400; text-transform: uppercase;
    letter-spacing: 0.42em; font-size: clamp(0.6rem, 1.4vw, 0.78rem);
    color: rgba(255,255,255,0.82); margin-bottom: clamp(20px, 3.2vh, 34px);
    padding-left: 0.42em;
  }

  /* ---------- Wordmark ---------- */
  .wordmark { display: inline-block; }
  .line { display: flex; align-items: center; justify-content: center; gap: 0.4em; line-height: 0.98; }
  .word { font-weight: 500; text-transform: uppercase; color: var(--white); text-shadow: 0 2px 30px rgba(85,115,94,0.35); }
  .word.the    { font-size: clamp(1.6rem, 5.2vw, 3.1rem); letter-spacing: 0.16em; padding-left: 0.16em; }
  .word.medical{ font-size: clamp(2.8rem, 9.6vw, 6rem); font-style: italic; font-weight: 500; letter-spacing: 0.03em; }
  .word.minute { font-size: clamp(2.4rem, 8.4vw, 5.3rem); letter-spacing: 0.1em; padding-left: 0.1em; }
  .line.l1 { margin-bottom: 0.04em; }
  .line.l3 { margin-top: 0.02em; }

  .ecg { height: 0.5em; width: clamp(64px, 11vw, 140px); overflow: visible; }
  .ecg path { fill: none; stroke: var(--white); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 300; stroke-dashoffset: 300; animation: trace 3.6s cubic-bezier(0.6,0,0.4,1) infinite;
    filter: drop-shadow(0 1px 8px rgba(255,255,255,0.35)); }
  @keyframes trace { 0% { stroke-dashoffset: 300; } 60%,100% { stroke-dashoffset: 0; } }

  .heart-wrap { display: inline-flex; }
  .heart { width: clamp(28px, 5.6vw, 56px); height: clamp(28px, 5.6vw, 56px); transform-origin: center; animation: beat 1.5s ease-in-out infinite; }
  .heart path { fill: none; stroke: var(--white); stroke-width: 5; stroke-linejoin: round; filter: drop-shadow(0 1px 8px rgba(255,255,255,0.35)); }
  @keyframes beat { 0%,45%,100% { transform: scale(1); } 12% { transform: scale(1.16); } 24% { transform: scale(1); } 32% { transform: scale(1.1); } }

  .subhead {
    font-family: var(--sans); font-weight: 300; text-transform: uppercase;
    letter-spacing: 0.28em; font-size: clamp(0.64rem, 1.5vw, 0.82rem);
    color: rgba(255,255,255,0.85); margin-top: clamp(18px, 3vh, 30px); padding-left: 0.28em;
  }

  /* ---------- CTA ---------- */
  .cta-wrap { margin-top: clamp(24px, 4vh, 40px); display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .cta-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .cta-wrap .btn { min-width: 150px; text-align: center; }

  /* ---------- Social dropdown ---------- */
  .social-dd { position: relative; display: inline-flex; flex-direction: column; align-items: center; }
  .dd-caret { display: inline-block; font-size: 0.8em; margin-left: 8px; transition: transform 0.3s var(--ease); }
  .social-dd.open .dd-caret { transform: rotate(180deg); }
  .dd-menu {
    position: absolute; top: calc(100% + 10px); left: 50%;
    transform: translateX(-50%) translateY(-8px); transform-origin: top center;
    display: flex; flex-direction: column; gap: 5px;
    background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.32);
    border-radius: 16px; padding: 8px; backdrop-filter: blur(12px);
    box-shadow: 0 20px 44px -18px rgba(55,80,63,0.6);
    opacity: 0; pointer-events: none; transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
    z-index: 40;
  }
  .social-dd.open .dd-menu { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .dd-item {
    font-family: var(--sans); font-weight: 400; text-transform: uppercase; letter-spacing: 0.18em;
    font-size: clamp(0.56rem, 1.2vw, 0.64rem); color: var(--white); text-decoration: none;
    text-align: center; white-space: nowrap; padding: 9px 20px; border-radius: 100px;
    transition: background 0.25s, color 0.25s;
  }
  .dd-item:hover { background: var(--white); color: var(--ink); }
  .btn {
    font-family: var(--sans); font-weight: 400; text-transform: uppercase; letter-spacing: 0.22em;
    font-size: clamp(0.66rem, 1.4vw, 0.8rem); text-decoration: none; cursor: pointer;
    padding: 14px 32px; border-radius: 100px; transition: transform 0.35s var(--ease), background 0.35s, color 0.35s, box-shadow 0.35s;
  }
  .btn.solid { background: var(--white); color: var(--ink); box-shadow: 0 14px 34px -14px rgba(55,80,63,0.6); }
  .btn.solid:hover { transform: translateY(-3px); box-shadow: 0 20px 40px -14px rgba(55,80,63,0.75); }
  .btn.outline { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.7); }
  .btn.outline:hover { background: var(--white); color: var(--ink); border-color: var(--white); box-shadow: 0 14px 34px -14px rgba(55,80,63,0.6); }

  /* Heartbeat pulse on hover — buttons + dropdown items */
  .cta-wrap .btn:hover, .dd-item:hover { animation: btnbeat 1s ease-in-out infinite; }
  @keyframes btnbeat {
    0%, 100% { transform: scale(1); }
    18% { transform: scale(1.07); }
    32% { transform: scale(1); }
    48% { transform: scale(1.045); }
    62% { transform: scale(1); }
  }
  /* Same heartbeat feel for the heart by "Minute" when hovered */
  .line.l3:hover .heart { animation: beat 0.85s ease-in-out infinite; }

  .handle {
    position: fixed; bottom: 22px; left: 0; right: 0; padding: 0 16px;
    font-family: var(--sans); font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase;
    font-size: 0.66rem; color: rgba(255,255,255,0.7); z-index: 1; text-align: center;
  }

  /* ---------- Entrance ---------- */
  .fade { opacity: 0; transform: translateY(22px); animation: rise 1.1s var(--ease) forwards; }
  .d0 { animation-delay: 0.15s; } .d1 { animation-delay: 0.4s; } .d2 { animation-delay: 0.62s; }
  .d3 { animation-delay: 0.82s; } .d4 { animation-delay: 1.05s; } .d5 { animation-delay: 1.3s; } .d6 { animation-delay: 1.55s; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  /* when returning via Back, skip the entrance so the page collapses cleanly into the button */
  .no-entrance .fade { opacity: 1 !important; transform: none !important; animation: none !important; }

  /* ---------- Page transitions ---------- */
  .tcover { position: fixed; inset: 0; z-index: 9990; pointer-events: none; opacity: 1; }
  .tcover.sage { background: linear-gradient(135deg, var(--sage-light), var(--sage-mid) 55%, var(--sage-deep)); }
  .tcover.black { background: #000; }
  .flytext {
    position: fixed; z-index: 9992; pointer-events: none; color: var(--white); margin: 0;
    font-family: var(--serif); font-weight: 500; line-height: 1.02; letter-spacing: -0.5px;
    text-align: center; white-space: nowrap; text-shadow: 0 2px 30px rgba(85,115,94,0.35);
  }

  /* ---------- Phones ---------- */
  @media (max-width: 600px) {
    body { height: auto; min-height: 100vh; overflow-x: hidden; overflow-y: auto; }
    .stage { padding: 88px 6vw 104px; }
    .eyebrow { letter-spacing: 0.3em; margin-bottom: 22px; }
    .subhead { letter-spacing: 0.2em; }
    .cta-wrap { gap: 14px; }
    .cta-wrap .btn { min-width: 132px; }
    .btn { padding: 13px 26px; }
    .handle { bottom: 16px; letter-spacing: 0.12em; font-size: 0.6rem; }
  }
  @media (max-width: 360px) {
    .cta-wrap .btn { min-width: 120px; }
    .handle { font-size: 0.54rem; letter-spacing: 0.08em; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    .fade { opacity: 1 !important; transform: none !important; }
    .ecg path { stroke-dashoffset: 0 !important; }
    .tcover { transition: opacity 0.2s linear; }
  }
</style>
</head>
<body>
  <div class="tcover" id="rc"></div>
  <script>(function(){var f=!sessionStorage.getItem('tmm_seen');sessionStorage.setItem('tmm_seen','1');document.getElementById('rc').className='tcover '+(f?'black':'sage');})();</script>

  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="grain"></div>

  <main class="stage">
    <div class="eyebrow fade d0">A Student Medical Club</div>

    <div class="wordmark">
      <div class="line l1">
        <span class="word the fade d1">The</span>
        <svg class="ecg fade d1" viewBox="0 0 150 30" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <path d="M2,15 L48,15 L58,15 L66,4 L74,26 L82,15 L128,15 L138,15 L148,15"/>
        </svg>
      </div>
      <div class="line l2"><span class="word medical fade d2">Medical</span></div>
      <div class="line l3">
        <span class="heart-wrap fade d3"><svg class="heart" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 27S4 19.5 4 11.6A6.6 6.6 0 0116 7.4 6.6 6.6 0 0128 11.6C28 19.5 16 27 16 27z"/>
        </svg></span>
        <span class="word minute fade d3">Minute</span>
      </div>
    </div>

    <div class="subhead fade d4">One part of the human body — every single day</div>

    <div class="cta-wrap fade d6">
      <div class="cta-row">
        <a href="about.html" class="btn outline" data-nav>About Us</a>
        <a href="officers.html" class="btn outline" data-nav>Officers</a>
        <div class="social-dd" id="joinDd">
          <button type="button" class="btn outline" id="joinBtn" aria-haspopup="true" aria-expanded="false">Join Us <span class="dd-caret">▾</span></button>
          <div class="dd-menu" role="menu">
            <a class="dd-item" href="https://docs.google.com/forms/d/e/1FAIpQLScvj_Q0q45x09JRSqxaDp6x8k_M5aKG2GwLcdfaENgBh1dz-g/viewform" target="_blank" rel="noopener" role="menuitem">The Club</a>
            <a class="dd-item" href="https://docs.google.com/forms/d/e/1FAIpQLSd9f8PqrvYJAP1_lKOusCsh_4Kl9hgHzsBsksp9b0HttMHeZw/viewform" target="_blank" rel="noopener" role="menuitem">A Chapter</a>
          </div>
        </div>
      </div>
      <div class="social-dd" id="socialDd">
        <button type="button" class="btn outline" id="socialBtn" aria-haspopup="true" aria-expanded="false">Social <span class="dd-caret">▾</span></button>
        <div class="dd-menu" role="menu">
          <a class="dd-item" href="https://www.instagram.com/themedicalminute/" target="_blank" rel="noopener" role="menuitem">Instagram</a>
          <a class="dd-item" href="https://www.tiktok.com/@themedicalminute17" target="_blank" rel="noopener" role="menuitem">TikTok</a>
          <a class="dd-item" href="mailto:themedicalminute17@gmail.com" role="menuitem">Email</a>
        </div>
      </div>
    </div>
  </main>

  <div class="handle fade d6">@themedicalminute&nbsp;&nbsp;·&nbsp;&nbsp;New post every day</div>

  <script>
    const RM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const EASE = 'cubic-bezier(0.22,0.75,0.28,1)';

    // ---- Aesthetic reveal on load: the cover gently fades away ----
    const rc = document.getElementById('rc');
    function reveal() {
      rc.style.transition = 'opacity 0.8s ' + EASE;
      rc.style.display = '';
      setTimeout(() => { rc.style.opacity = '0'; }, 30);
      setTimeout(() => { rc.style.display = 'none'; }, 950);
    }
    window.addEventListener('pageshow', reveal);

    // ---- Dropdowns (Join Us + Social) ----
    const dropdowns = document.querySelectorAll('.social-dd');
    function closeAllDropdowns() {
      dropdowns.forEach(dd => { dd.classList.remove('open'); dd.querySelector('button').setAttribute('aria-expanded', 'false'); });
    }
    dropdowns.forEach(dd => {
      const btn = dd.querySelector('button');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const wasOpen = dd.classList.contains('open');
        closeAllDropdowns();
        if (!wasOpen) { dd.classList.add('open'); btn.setAttribute('aria-expanded', 'true'); }
      });
    });
    document.addEventListener('click', (e) => {
      dropdowns.forEach(dd => { if (!dd.contains(e.target)) { dd.classList.remove('open'); dd.querySelector('button').setAttribute('aria-expanded', 'false'); } });
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAllDropdowns(); });

    // ---- Aesthetic page transition: gently fade to sage, then navigate ----
    function fadeTo(url) {
      const cover = document.createElement('div');
      cover.className = 'tcover sage';
      cover.style.opacity = '0';
      cover.style.transition = 'opacity 0.55s ' + EASE;
      document.body.appendChild(cover);
      setTimeout(() => { cover.style.opacity = '1'; }, 20);
      setTimeout(() => { window.location.href = url; }, 560);
    }

    document.querySelectorAll('a[data-nav]').forEach(link => {
      link.addEventListener('click', (e) => {
        const url = link.getAttribute('href');
        if (!url || url.startsWith('#')) return;
        e.preventDefault();
        if (RM) { window.location.href = url; return; }
        fadeTo(url);
      });
    });
  </script>
</body>
</html>
